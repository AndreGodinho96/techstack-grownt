// ── Auth ─────────────────────────────────────────────
async function initAuth(){
  // Supabase v2 processes the magic link hash automatically
  // Listen for auth state changes first (catches SIGNED_IN after magic link)
  sb.auth.onAuthStateChange((event, session) => {
    if((event==="SIGNED_IN"||event==="TOKEN_REFRESHED")&&session){
      // Clean the URL hash after login
      if(window.history.replaceState){
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      showApp(session.user);
    }
    if(event==="SIGNED_OUT") showLogin();
  });

  // Check for existing session
  const {data:{session}} = await sb.auth.getSession();
  if(session){
    showApp(session.user);
  } else {
    // If there's no session and no token in URL, show login
    const hasHashToken = window.location.hash.includes('access_token') || window.location.hash.includes('token_hash') || window.location.search.includes('token_hash');
    if(!hasHashToken) showLogin();
    // else: wait for onAuthStateChange SIGNED_IN event
  }
}

function showLogin(){
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app-screen").style.display="none";
}

function showApp(user){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app-screen").style.display="block";
  window._currentUser = user;
  loadData();
}


async function fetchCambio(){
  try {
    // Get last 7 calendar days to guarantee 3 business days
    const dias = [];
    const hoje = new Date();
    for(let i=1; i<=8; i++){
      const d = new Date(hoje);
      d.setDate(d.getDate()-i);
      // Skip weekends
      if(d.getDay()===0||d.getDay()===6) continue;
      dias.push(d);
      if(dias.length>=3) break;
    }

    const fmt = d => String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'-'+d.getFullYear();
    const fmtBR = d => String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');

    const fetchRate = async (endpoint) => {
      const r = await fetch(endpoint);
      if(!r.ok) return [];
      const j = await r.json();
      return j.value||[];
    };

    // USD — last 3 business days
    const startD = dias[dias.length-1];
    const endD = dias[0];
    const usdData = await fetchRate(
      `https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoDolarPeriodo(dataInicial=@i,dataFinalCotacao=@f)?@i='${fmt(startD)}'&@f='${fmt(endD)}'&$format=json&$orderby=dataHoraCotacao%20desc&$select=cotacaoVenda,dataHoraCotacao`
    );

    // EUR — same period
    const eurData = await fetchRate(
      `https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoMoedaPeriodo(moeda=@m,dataInicial=@i,dataFinalCotacao=@f)?@m='EUR'&@i='${fmt(startD)}'&@f='${fmt(endD)}'&$format=json&$orderby=dataHoraCotacao%20desc&$select=cotacaoVenda,dataHoraCotacao`
    );

    // Group by date — last closing rate per day
    const byDay = (data) => {
      const seen = {};
      data.forEach(r => {
        const day = r.dataHoraCotacao.slice(0,10);
        if(!seen[day]) seen[day] = r.cotacaoVenda;
      });
      return Object.entries(seen).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,3).map(([d,v])=>({
        label: fmtBR(new Date(d+'T12:00:00')),
        value: v,
        date: d
      }));
    };

    S.cambio = { usd: byDay(usdData), eur: byDay(eurData), updated: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) };
    render();
  } catch(e) {
    S.cambio = { error: e.message };
    render();
  }
}
window._calcBRL = function(forceToday){
  const moeda = document.getElementById("f-moeda")?.value||"BRL";
  const original = parseFloat(document.getElementById("f-custo_original")?.value)||0;
  const campoTaxa = document.getElementById("f-cambio");
  const campoBRL = document.getElementById("f-custo_brl_mes");
  const preview = document.getElementById("modal-cambio-preview");
  if(moeda==="BRL"){ if(preview) preview.textContent=""; return; }
  // Get rate
  let taxa = parseFloat(campoTaxa?.value)||0;
  const taxaHoje = moeda==="USD" ? S.cambio?.usd?.[0]?.value : S.cambio?.eur?.[0]?.value;
  if(forceToday && taxaHoje){ taxa = taxaHoje; if(campoTaxa) campoTaxa.value = taxaHoje.toFixed(4); }
  if(!taxa || !original){ if(preview) preview.textContent=""; return; }
  const brl = (original*taxa).toFixed(2);
  if(campoBRL && (forceToday || !campoBRL.value)) campoBRL.value = brl;
  if(preview){
    const varStr = S.cambio?.usd?.[0]?.value && moeda==="USD" ? ` · hoje: R$ ${(original*taxaHoje).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : (S.cambio?.eur?.[0]?.value && moeda==="EUR" ? ` · hoje: R$ ${(original*taxaHoje).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : "");
    preview.innerHTML = `<span style="color:var(--orange);font-weight:700">${moeda} ${original.toLocaleString('pt-BR',{minimumFractionDigits:2})} × R$ ${taxa.toFixed(4)} = R$ ${parseFloat(brl).toLocaleString('pt-BR',{minimumFractionDigits:2})}/mês</span>${varStr}`;
  }
};
window._usarCambioHoje = function(){
  const moeda = document.getElementById("f-moeda")?.value||"BRL";
  if(moeda==="BRL") return;
  const taxa = moeda==="USD" ? S.cambio?.usd?.[0]?.value : S.cambio?.eur?.[0]?.value;
  if(!taxa) return;
  const campo = document.getElementById("f-cambio");
  const notasCampo = document.getElementById("f-cambio_notas");
  if(campo) campo.value = taxa.toFixed(4);
  const hoje = new Date().toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
  if(notasCampo && !notasCampo.value) notasCampo.value = `${moeda} 1 = R$ ${taxa.toFixed(4)} em ${hoje} (PTAX BCB)`;
  window._calcBRL(true);
};

window._maximizeChart = function(canvasId, title) {
  const src = document.getElementById(canvasId);
  if (!src) return;
  // Remove existing modal if any
  const existing = document.getElementById('chart-modal-overlay');
  if (existing) existing.remove();
  // Create modal
  const overlay = document.createElement('div');
  overlay.className = 'chart-modal-overlay';
  overlay.id = 'chart-modal-overlay';
  overlay.innerHTML = `<div class="chart-modal-box">
    <div class="chart-modal-title">${title}</div>
    <button class="chart-modal-close" onclick="document.getElementById('chart-modal-overlay').remove()">×</button>
    <canvas id="chart-modal-canvas"></canvas>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  // Clone chart data
  const srcChart = Chart.getChart(src);
  if (!srcChart) return;
  const ctx = document.getElementById('chart-modal-canvas').getContext('2d');
  new Chart(ctx, {
    type: srcChart.config.type,
    data: JSON.parse(JSON.stringify(srcChart.config.data)),
    options: { ...srcChart.config.options, responsive: true, maintainAspectRatio: false,
      plugins: { ...(srcChart.config.options?.plugins||{}),
        legend: { ...(srcChart.config.options?.plugins?.legend||{}), labels: { font: { size: 13 } } }
      }
    }
  });
};

async function sbFetch(path,opts={}){
  const {data:{session}} = await sb.auth.getSession();
  const token = session?.access_token || SB_KEY;
  const res=await fetch(`${SB_URL}/rest/v1/${path}`,{
    headers:{apikey:SB_KEY,Authorization:`Bearer ${token}`,"Content-Type":"application/json",Prefer:opts.prefer||"return=representation",...(opts.headers||{})},
    ...opts

  if(!res.ok)throw new Error(await res.text());
  if(res.status===204)return null;

  const total = ativas.reduce((s,t) => s + (parseFloat(t.custo_brl_mes)||0), 0);
  const depts = getDepts();
  const COLORS = ["#f15f38","#1a2437","#F59E0B","#16a34a","#7c3aed","#0369a1","#be185d","#065f46","#92400e","#1e3a8a"];

  // PIE — custo por departamento
  const pieCanvas = document.getElementById("pie-dept");
  if (pieCanvas && !_charts["pie-dept"]) {
    const dc = depts.map(d => ({
      d, c: ativas.filter(t => t.departamento === d).reduce((s,t) => s+(parseFloat(t.custo_brl_mes)||0), 0)
    })).filter(x => x.c > 0).sort((a,b) => b.c - a.c);

    _charts["pie-dept"] = new Chart(pieCanvas, {
      type: "doughnut",
      data: {
        labels: dc.map(d => d.d),
        datasets: [{ data: dc.map(d => d.c), backgroundColor: COLORS.slice(0, dc.length), borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: "60%",
        plugins: {
          legend: { display: true, position: "right", labels: {
            color: "#111", font: { size: 11, family: "Inter,system-ui" }, boxWidth: 10, padding: 10,
            generateLabels: (chart) => {
              return chart.data.labels.map((l, i) => ({
                text: `${l}  ${((chart.data.datasets[0].data[i]/total)*100).toFixed(1)}%`,
                fillStyle: chart.data.datasets[0].backgroundColor[i],
                strokeStyle: "transparent", index: i
              }));
            }
          }},
          tooltip: { callbacks: { label: (ctx) => {
            const v = ctx.raw;
            return ` ${ctx.label}: R$ ${v.toLocaleString("pt-BR",{maximumFractionDigits:0})} (${((v/total)*100).toFixed(1)}%)`;
          }}}
        }
      }
    });
  }

  // PIE — custo por categoria funcional
  const pieCatCanvas = document.getElementById("pie-cat");
  if (pieCatCanvas && !_charts["pie-cat"]) {
    const catData = {};
    ativas.forEach(t => { const k = t.categoria_funcional||"N/D"; catData[k] = (catData[k]||0) + (parseFloat(t.custo_brl_mes)||0); });
    const cd = Object.entries(catData).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    _charts["pie-cat"] = new Chart(pieCatCanvas, {
      type: "doughnut",
      data: { labels: cd.map(([k])=>k), datasets: [{ data: cd.map(([,v])=>v), backgroundColor: COLORS.slice(0,cd.length), borderWidth:0, hoverOffset:6 }] },
      options: { responsive:true, maintainAspectRatio:false, cutout:"60%",
        plugins: {
          legend: { display:true, position:"right", labels: { color:"#111", font:{size:10}, boxWidth:10, padding:8 } },
          tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: R$ ${ctx.raw.toLocaleString("pt-BR",{maximumFractionDigits:0})}` }}
        }
      }
    });
  }

  // LINE — evolução mensal
  const lineCanvas = document.getElementById("line-chart");
  if (lineCanvas && !_charts["line"]) {
    const snaps = [...(S.snapshots||[])].sort((a,b) => new Date(a.mes_referencia) - new Date(b.mes_referencia));
    const currentMonth = new Date().toISOString().slice(0,7);
    const hasCurrentMonth = snaps.some(s => s.mes_referencia && s.mes_referencia.slice(0,7) === currentMonth);
    const allPoints = [...snaps];
    if (!hasCurrentMonth) allPoints.push({ mes_referencia: currentMonth+"-01", total_ativas_brl: total, notas: "Atual" });

    const labels = allPoints.map(s => {
      const d = new Date(s.mes_referencia+"T12:00:00");
      return d.toLocaleDateString("pt-BR", { month:"short", year:"2-digit" });
    });
    const values = allPoints.map(s => parseFloat(s.total_ativas_brl)||0);

    _charts["line"] = new Chart(lineCanvas, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Custo ativas BRL/mês",
          data: values,
          borderColor: "#f15f38",
          backgroundColor: "rgba(232,70,30,0.08)",
          borderWidth: 2.5,
          pointBackgroundColor: values.map((v,i) => i === values.length-1 ? "#f15f38" : "#1a2437"),
          pointRadius: 5, pointHoverRadius: 7,
          fill: true, tension: 0.3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => `R$ ${ctx.raw.toLocaleString("pt-BR",{maximumFractionDigits:0})}` }}
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color:"#888", font:{size:11} } },
          y: { grid: { color: gridColor }, ticks: { color:"#888", font:{size:11}, callback: v => "R$"+Math.round(v/1000)+"k" }, beginAtZero: false }
        }
      }
    });
  }
}

function render(){
  destroyCharts();
  document.getElementById("root").innerHTML=buildHTML();
  attachEvents();
  buildChartsIfNeeded();
}

            ${(S.cambio.usd||[]).map((r,i)=>`<span style="font-size:11px;font-weight:${i===0?800:500};color:${i===0?"white":"rgba(255,255,255,.4)"}" title="${r.label}">R$ ${Number(r.value).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}${i<(S.cambio.usd.length-1)?'':''}</span>`).join('<span style="color:rgba(255,255,255,.15);font-size:10px;margin:0 1px">·</span>')}

        <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:4px 10px">

                  const varPct = t.cambio_contratacao&&taxaHoje ? ((taxaHoje-t.cambio_contratacao)/t.cambio_contratacao*100) : null;

                  <div style="font-size:13px;font-weight:700;color:#1a2437">R$ ${Number(taxaHoje).toLocaleString("pt-BR",{minimumFractionDigits:4})}</div>
                  ${varPct!==null?`<div style="font-size:10px;font-weight:700;color:${varPct>0?"#dc2626":"#16a34a"}">${varPct>0?"+":""}${varPct.toFixed(1)}% desde contratação</div>`:""}

                  <div style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">BRL/mês estimado hoje</div>

                  ${brlHoje>t.custo_brl_mes*1.05?`<div style="font-size:10px;color:#dc2626">▲ vs registado R$ ${Number(t.custo_brl_mes).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>`:""}
                </div>`:"";
                })():""}
              </div>`:""}${t.cambio_contratacao?`<div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Câmbio na contratação</div><div style="font-size:12px;color:#1a2437;font-weight:500">${t.moeda||"USD"} 1 = R$ ${Number(t.cambio_contratacao).toLocaleString("pt-BR",{minimumFractionDigits:4})}${t.cambio_notas?" · "+t.cambio_notas:""}</div></div>`:""}${t.contrato?`<div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Contrato</div><div style="font-size:12px;font-weight:700;color:#16a34a">✓ Possui contrato</div></div>`:""}
              ${t.data_contratacao?`<div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Contratado em</div><div style="font-size:12px;color:#1a2437;font-weight:500">${new Date(t.data_contratacao+"T12:00:00").toLocaleDateString("pt-BR")}</div></div>`:""}
              ${t.aprovado_por?`<div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Aprovado por</div><div style="font-size:12px;color:#1a2437;font-weight:500">${t.aprovado_por}</div></div>`:""}
              ${t.mercado&&t.mercado!=="Global"?`<div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Mercado</div><div style="font-size:12px;color:#1a2437;font-weight:500">${t.mercado}</div></div>`:""}
              ${t.missao_critica?`<div><div style="font-size:10px;font-weight:700;color:#dc2626;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Missão crítica</div><div style="font-size:12px;font-weight:700;color:#dc2626">⚠ Sim</div></div>`:""}
            </div>
            ${(t.acao_pendente||t.risco_obs||t.alertas||t.benchmark_notas)?`<div style="display:flex;flex-direction:column;gap:8px;padding-top:12px;border-top:1px solid var(--silver)">
              ${t.acao_pendente?`<div style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:11px;font-weight:700;background:#fef3c7;color:#b45309;padding:2px 7px;border-radius:4px;flex-shrink:0">AÇÃO</span><span style="font-size:12px;color:#1a2437">${t.acao_pendente}</span></div>`:""}
              ${t.risco_obs?`<div style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:11px;font-weight:700;background:#fef2f2;color:#dc2626;padding:2px 7px;border-radius:4px;flex-shrink:0">RISCO</span><span style="font-size:12px;color:#1a2437">${t.risco_obs}</span></div>`:""}
              ${t.alertas?`<div style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:11px;font-weight:700;background:#fef2f2;color:#dc2626;padding:2px 7px;border-radius:4px;flex-shrink:0">ALERTA</span><span style="font-size:12px;color:#1a2437">${t.alertas}</span></div>`:""}
              ${t.benchmark_notas?`<div style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:11px;font-weight:700;background:#e0f2fe;color:#0369a1;padding:2px 7px;border-radius:4px;flex-shrink:0">NOTA</span><span style="font-size:12px;color:#1a2437">${t.benchmark_notas}</span></div>`:""}
            </div>`:""}
            <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--silver);display:flex;justify-content:flex-end">
              <button class="edit-btn" data-id="${t.id}" onclick="event.stopPropagation()" style="padding:5px 14px;font-size:12px">✏ Editar ferramenta</button>
            </div>
          </div>
        </td></tr>`:""}
        `;
      }).join("")}</tbody>
    </table></div>
    ${f.length===0?`<div class="empty">Nenhuma ferramenta encontrada</div>`:""}
  </div>`;
}

function buildRiscos(ro){
  const total_r = ro.length;
  if(!total_r) return`<div class="card"><div class="empty">Sem riscos abertos ✓</div></div>`;
  const alta = ro.filter(r=>r.prioridade==="ALTA").length;

function buildHistorico(){

  const outros_total = S.changelog.length - canc_total - contr_total;
  const economia = S.changelog.filter(c=>c.tipo_evento==="Cancelamento"&&c.impacto_brl).reduce((s,c)=>s+(parseFloat(c.impacto_brl)||0),0);
  return`

    <div style="background:var(--navy);border-radius:var(--radius-md);padding:14px 16px;border-top:3px solid #22c55e">
      <div style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">Contratações</div>
      <div style="font-size:24px;font-weight:900;color:#22c55e">${contr_total}</div>

    <div style="background:var(--navy);border-radius:var(--radius-md);padding:14px 16px;border-top:3px solid #22c55e">
      <div style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">Economia registada</div>

    <div class="card-header" style="margin:-18px -20px 14px">
      <span class="card-title">Eventos por mês</span>

  <div class="card fade">
    <div class="card-header"><span class="card-title">Log de mudanças</span><span style="font-size:11px;color:var(--muted);font-weight:700">${S.changelog.length} eventos</span></div>
    <div class="tw"><table>
      <thead><tr><th>Data</th><th>Ferramenta</th><th>Tipo</th><th>De → Para</th><th>Impacto BRL</th><th>Observações</th></tr></thead>

        const tc=c.tipo_evento==="Cancelamento"?"color:#dc2626;background:#fef2f2":c.tipo_evento==="Contratação"?"color:#15803d;background:#dcfce7":"color:#b45309;background:#fef3c7";

          <td style="color:var(--muted);font-size:12px">${c.observacoes||"—"}</td>
        </tr>`;}).join("")}

function attachEvents(){
  document.getElementById("btn-refresh")?.addEventListener("click",loadData);
  document.getElementById("btn-logout")?.addEventListener("click",async()=>{await sb.auth.signOut();showLogin();});
  document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{S.tab=btn.dataset.tab;render();}));
  document.getElementById("search-input")?.addEventListener("input",e=>{S.search=e.target.value;render();});
  document.getElementById("filter-status")?.addEventListener("change",e=>{S.fStatus=e.target.value;render();});
  document.getElementById("filter-dept")?.addEventListener("change",e=>{S.fDept=e.target.value;render();});
  document.querySelectorAll(".edit-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const tool=S.tools.find(t=>t.id==btn.dataset.id);if(!tool)return;
    S.editTool=tool;S.editForm={responsavel:tool.responsavel||"",aprovado_por:tool.aprovado_por||"",centro_de_custo:tool.centro_de_custo||"",score_utilizacao:tool.score_utilizacao||"",nps_interno:tool.nps_interno||"",substituto:tool.substituto||"",data_contratacao:tool.data_contratacao||"",ultima_revisao:tool.ultima_revisao||"",acao_pendente:tool.acao_pendente||"",custo_original:tool.custo_original||"",moeda:tool.moeda||"BRL",custo_brl_mes:tool.custo_brl_mes||"",cambio_contratacao:tool.cambio_contratacao||"",cambio_notas:tool.cambio_notas||""};
    render();
  }));
  document.querySelectorAll(".cbtn").forEach(btn=>btn.addEventListener("click",async()=>{
    btn.disabled=true;btn.textContent="...";
    try{await patchRisk(parseInt(btn.dataset.riskId),{status_acao:"Concluído",data_resolucao:new Date().toISOString().slice(0,10)});S.risks=S.risks.map(r=>r.id==btn.dataset.riskId?{...r,status_acao:"Concluído"}:r);toast("Risco concluído");render();}
    catch(e){toast("Erro",true);btn.disabled=false;btn.textContent="Concluir";}
  }));
  document.getElementById("modal-bg")?.addEventListener("click",e=>{if(e.target.id==="modal-bg")closeModal();});
  document.getElementById("modal-close")?.addEventListener("click",closeModal);
  document.getElementById("modal-cancel")?.addEventListener("click",closeModal);
  document.getElementById("modal-save")?.addEventListener("click",async()=>{
    const gv=id=>document.getElementById(id)?.value||null;const gn=id=>{const v=document.getElementById(id)?.value;return v?parseFloat(v):null;};const payload={responsavel:gv("f-responsavel"),aprovado_por:gv("f-aprovado_por"),centro_de_custo:gv("f-centro"),score_utilizacao:gv("f-score")?parseInt(gv("f-score")):null,nps_interno:gv("f-nps"),substituto:gv("f-substituto"),data_contratacao:gv("f-data_c"),ultima_revisao:gv("f-ultima_r"),acao_pendente:gv("f-acao"),custo_original:gn("f-custo_original"),moeda:gv("f-moeda")||"BRL",custo_brl_mes:gn("f-custo_brl_mes"),cambio_contratacao:gn("f-cambio"),cambio_notas:gv("f-cambio_notas")};
    S.saving=true;render();
    try{await patchTool(S.editTool.id,payload);S.tools=S.tools.map(t=>t.id===S.editTool.id?{...t,...payload}:t);toast("Alteração guardada");S.editTool=null;}
    catch(e){toast("Erro ao guardar",true);}
    finally{S.saving=false;render();}
  });
}
function closeModal(){S.editTool=null;render();}

initAuth();
</script>
