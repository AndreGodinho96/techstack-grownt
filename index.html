// ── Auth ─────────────────────────────────────────────
async function initAuth(){
  // Supabase v2 processes the magic link hash automatically
  // Listen for auth state changes first (catches SIGNED_IN after magic link)
  sb.auth.onAuthStateChange((event, session) => {
    if((event==="SIGNED_IN"||event==="TOKEN_REFRESHED")&&session){
      // Clean the URL hash after login
      if(window.history.replaceState){
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      showApp(session.user);
    }
    if(event==="SIGNED_OUT") showLogin();
  });

  // Check for existing session
  const {data:{session}} = await sb.auth.getSession();
  if(session){
    showApp(session.user);
  } else {
    // If there's no session and no token in URL, show login
    const hasHashToken = window.location.hash.includes('access_token') || window.location.hash.includes('token_hash') || window.location.search.includes('token_hash');
    if(!hasHashToken) showLogin();
    // else: wait for onAuthStateChange SIGNED_IN event
  }
}

function showLogin(){
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app-screen").style.display="none";
}

function showApp(user){

  document.getElementById("app-screen").style.display="block";
  window._currentUser = user;
  loadData();
}


async function fetchCambio(){
  try {
    // Get last 7 calendar days to guarantee 3 business days
    const dias = [];
    const hoje = new Date();
    for(let i=1; i<=8; i++){
      const d = new Date(hoje);
      d.setDate(d.getDate()-i);
      // Skip weekends
      if(d.getDay()===0||d.getDay()===6) continue;
      dias.push(d);
      if(dias.length>=3) break;
    }

    const fmt = d => String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'-'+d.getFullYear();
    const fmtBR = d => String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');

    const fetchRate = async (endpoint) => {
      const r = await fetch(endpoint);
      if(!r.ok) return [];
      const j = await r.json();
      return j.value||[];
    };

    // USD — last 3 business days
    const startD = dias[dias.length-1];
    const endD = dias[0];
    const usdData = await fetchRate(
      `https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoDolarPeriodo(dataInicial=@i,dataFinalCotacao=@f)?@i='${fmt(startD)}'&@f='${fmt(endD)}'&$format=json&$orderby=dataHoraCotacao%20desc&$select=cotacaoVenda,dataHoraCotacao`
    );

    // EUR — same period
    const eurData = await fetchRate(
      `https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoMoedaPeriodo(moeda=@m,dataInicial=@i,dataFinalCotacao=@f)?@m='EUR'&@i='${fmt(startD)}'&@f='${fmt(endD)}'&$format=json&$orderby=dataHoraCotacao%20desc&$select=cotacaoVenda,dataHoraCotacao`
    );

    // Group by date — last closing rate per day
    const byDay = (data) => {
      const seen = {};
      data.forEach(r => {
        const day = r.dataHoraCotacao.slice(0,10);
        if(!seen[day]) seen[day] = r.cotacaoVenda;
      });
      return Object.entries(seen).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,3).map(([d,v])=>({
        label: fmtBR(new Date(d+'T12:00:00')),
        value: v,
        date: d
      }));
    };

    S.cambio = { usd: byDay(usdData), eur: byDay(eurData), updated: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) };
    render();
  } catch(e) {
    S.cambio = { error: e.message };
    render();
  }
}
window._calcBRL = function(forceToday){
  const moeda = document.getElementById("f-moeda")?.value||"BRL";
  const original = parseFloat(document.getElementById("f-custo_original")?.value)||0;
  const campoTaxa = document.getElementById("f-cambio");
  const campoBRL = document.getElementById("f-custo_brl_mes");
  const preview = document.getElementById("modal-cambio-preview");
  if(moeda==="BRL"){ if(preview) preview.textContent=""; return; }
  // Get rate
  let taxa = parseFloat(campoTaxa?.value)||0;
  const taxaHoje = moeda==="USD" ? S.cambio?.usd?.[0]?.value : S.cambio?.eur?.[0]?.value;
  if(forceToday && taxaHoje){ taxa = taxaHoje; if(campoTaxa) campoTaxa.value = taxaHoje.toFixed(4); }
  if(!taxa || !original){ if(preview) preview.textContent=""; return; }
  const brl = (original*taxa).toFixed(2);

function buildChartsIfNeeded() {
  if (S.tab !== "custos" && S.tab !== "riscos" && S.tab !== "projecao") return;
  const ativas = getAtivas();
  const total = ativas.reduce((s,t) => s + (parseFloat(t.custo_brl_mes)||0), 0);
  const depts = getDepts();
  const COLORS = ["#E8461E","#1A1F2E","#F59E0B","#16a34a","#7c3aed","#0369a1","#be185d","#065f46","#92400e","#1e3a8a"];
  const gridColor = "rgba(0,0,0,0.06)";

  // PIE — custo por departamento
  const pieCanvas = document.getElementById("pie-dept");
  if (pieCanvas && !_charts["pie-dept"]) {
    const dc = depts.map(d => ({
      d, c: ativas.filter(t => t.departamento === d).reduce((s,t) => s+(parseFloat(t.custo_brl_mes)||0), 0)
    })).filter(x => x.c > 0).sort((a,b) => b.c - a.c);

    _charts["pie-dept"] = new Chart(pieCanvas, {
      type: "doughnut",
      data: {
        labels: dc.map(d => d.d),
        datasets: [{ data: dc.map(d => d.c), backgroundColor: COLORS.slice(0, dc.length), borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: "60%",
        plugins: {
          legend: { display: true, position: "right", labels: {
            color: "#111", font: { size: 11, family: "Inter,system-ui" }, boxWidth: 10, padding: 10,
            generateLabels: (chart) => {
              return chart.data.labels.map((l, i) => ({
                text: `${l}  ${((chart.data.datasets[0].data[i]/total)*100).toFixed(1)}%`,
                fillStyle: chart.data.datasets[0].backgroundColor[i],
                strokeStyle: "transparent", index: i
              }));
            }
          }},
          tooltip: { callbacks: { label: (ctx) => {
            const v = ctx.raw;
            return ` ${ctx.label}: R$ ${v.toLocaleString("pt-BR",{maximumFractionDigits:0})} (${((v/total)*100).toFixed(1)}%)`;
          }}}
        }
      }
    });
  }

  // PIE — custo por categoria funcional
  const pieCatCanvas = document.getElementById("pie-cat");
  if (pieCatCanvas && !_charts["pie-cat"]) {
    const catData = {};
    ativas.forEach(t => { const k = t.categoria_funcional||"N/D"; catData[k] = (catData[k]||0) + (parseFloat(t.custo_brl_mes)||0); });
    const cd = Object.entries(catData).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    _charts["pie-cat"] = new Chart(pieCatCanvas, {
      type: "doughnut",
      data: { labels: cd.map(([k])=>k), datasets: [{ data: cd.map(([,v])=>v), backgroundColor: COLORS.slice(0,cd.length), borderWidth:0, hoverOffset:6 }] },
      options: { responsive:true, maintainAspectRatio:false, cutout:"60%",
        plugins: {
          legend: { display:true, position:"right", labels: { color:"#111", font:{size:10}, boxWidth:10, padding:8 } },
          tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: R$ ${ctx.raw.toLocaleString("pt-BR",{maximumFractionDigits:0})}` }}
        }
      }
    });
  }

  // LINE — evolução mensal
  const lineCanvas = document.getElementById("line-chart");
  if (lineCanvas && !_charts["line"]) {
    const snaps = [...(S.snapshots||[])].sort((a,b) => new Date(a.mes_referencia) - new Date(b.mes_referencia));
    const currentMonth = new Date().toISOString().slice(0,7);
    const hasCurrentMonth = snaps.some(s => s.mes_referencia && s.mes_referencia.slice(0,7) === currentMonth);
    const allPoints = [...snaps];
    if (!hasCurrentMonth) allPoints.push({ mes_referencia: currentMonth+"-01", total_ativas_brl: total, notas: "Atual" });

    const labels = allPoints.map(s => {
      const d = new Date(s.mes_referencia+"T12:00:00");
      return d.toLocaleDateString("pt-BR", { month:"short", year:"2-digit" });
    });
    const values = allPoints.map(s => parseFloat(s.total_ativas_brl)||0);

    _charts["line"] = new Chart(lineCanvas, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Custo ativas BRL/mês",
          data: values,
          borderColor: "#E8461E",
          backgroundColor: "rgba(232,70,30,0.08)",
          borderWidth: 2.5,
          pointBackgroundColor: values.map((v,i) => i === values.length-1 ? "#E8461E" : "#1A1F2E"),
          pointRadius: 5, pointHoverRadius: 7,
          fill: true, tension: 0.3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => `R$ ${ctx.raw.toLocaleString("pt-BR",{maximumFractionDigits:0})}` }}
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color:"#888", font:{size:11} } },
          y: { grid: { color: gridColor }, ticks: { color:"#888", font:{size:11}, callback: v => "R$"+Math.round(v/1000)+"k" }, beginAtZero: false }
        }
      }
    });
  }

  // BAR+LINE — Impacto mensal da projeção (aba Projeção)
  const projCanvas = document.getElementById("bar-projecao");
  if (projCanvas && !_charts["bar-projecao"]) {
    const MES = PROJ_P.MESES;
    const linha = MES.map((_, mi) => ativas.reduce((s, t) => { const v = projMesTool(t, mi); return s + (v || 0); }, 0));
    const caixa = MES.map(() => 0);
    const renovByMonth = MES.map(() => []);
    ativas.forEach(t => {
      let idxRen = -1;
      if (t.recorrencia === "Anual" && t.prox_renovacao) {
        const d = new Date(t.prox_renovacao + "T12:00:00");
        if (!isNaN(d.getTime())) idxRen = PROJ_P.CAL.indexOf(d.getMonth());
      }
      if (idxRen >= 0) {
        const v = (projMesTool(t, idxRen) || 0) * 12;
        caixa[idxRen] += v;
        renovByMonth[idxRen].push(t.ferramenta + " — R$ " + Math.round(v).toLocaleString("pt-BR"));
      } else {
        MES.forEach((_, mi) => { caixa[mi] += projMesTool(t, mi) || 0; });
      }
    });
    _charts["bar-projecao"] = new Chart(projCanvas, {
      type: "bar",
      data: {
        labels: MES,
        datasets: [
          { type: "bar", label: "Desembolso estimado (caixa)", data: caixa,
            backgroundColor: caixa.map((v, i) => v > linha[i] * 1.15 ? "#E8461E" : "#1A1F2E"),
            borderRadius: 6, maxBarThickness: 38 },
          { type: "line", label: "Custo projetado mensal", data: linha,
            borderColor: "#E8461E", borderDash: [6, 4], borderWidth: 2, pointRadius: 0, fill: false }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: "bottom", labels: { color: "#555", font: { size: 11 }, boxWidth: 12, padding: 12 } },
          tooltip: { callbacks: {
            label: (c) => " " + c.dataset.label + ": R$ " + Number(c.raw).toLocaleString("pt-BR", { maximumFractionDigits: 0 }),
            afterBody: (items) => { const i = items[0].dataIndex; return renovByMonth[i].length ? [""].concat(["Renovações no mês:"], renovByMonth[i].map(r => "• " + r)) : []; }
          } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: "#888", font: { size: 11 } } },
          y: { grid: { color: gridColor }, ticks: { color: "#888", font: { size: 11 }, callback: v => "R$" + Math.round(v / 1000) + "k" }, beginAtZero: true }
        }
      }
    });
  }

}

function render(){
  destroyCharts();
  document.getElementById("root").innerHTML=buildHTML();
  attachEvents();
  buildChartsIfNeeded();
}

        `;

    </table></div>
    ${f.length===0?`<div class="empty">Nenhuma ferramenta encontrada</div>`:""}

}

function buildHistorico(){
  const canc_total = S.changelog.filter(c=>c.tipo_evento==="Cancelamento").length;
  const contr_total = S.changelog.filter(c=>c.tipo_evento==="Contratação").length;
  const outros_total = S.changelog.length - canc_total - contr_total;
  const economia = S.changelog.filter(c=>c.tipo_evento==="Cancelamento"&&c.impacto_brl).reduce((s,c)=>s+(parseFloat(c.impacto_brl)||0),0);
  const HGR={mensal:"Mensal",trimestral:"Trimestral",anual:"Anual"};
  const perKey=d=>{if(!d)return"s/ data";const dt=new Date(d+"T12:00:00");const y=dt.getFullYear(),m=dt.getMonth();if(S.histGran==="anual")return`${y}`;if(S.histGran==="trimestral")return`${y} · T${Math.floor(m/3)+1}`;return`${y}-${String(m+1).padStart(2,"0")}`;};
  const agg={};S.changelog.forEach(c=>{const k=perKey(c.data_evento);if(!agg[k])agg[k]={periodo:k,n:0,impacto:0,canc:0,contr:0};agg[k].n++;agg[k].impacto+=parseFloat(c.impacto_brl)||0;if(c.tipo_evento==="Cancelamento")agg[k].canc++;if(c.tipo_evento==="Contratação")agg[k].contr++;});
  const aggArr=Object.values(agg).sort((a,b)=>a.periodo<b.periodo?1:-1);
  return`
  <!-- METRICS HISTORICO -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
    <div style="background:var(--navy);border-radius:8px;padding:14px 16px;border-top:3px solid var(--orange)">
      <div style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">Total eventos</div>
      <div style="font-size:24px;font-weight:900;color:white">${S.changelog.length}</div>
    </div>
    <div style="background:var(--navy);border-radius:8px;padding:14px 16px;border-top:3px solid #dc2626">
      <div style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">Cancelamentos</div>
      <div style="font-size:24px;font-weight:900;color:#dc2626">${canc_total}</div>
    </div>
    <div style="background:var(--navy);border-radius:8px;padding:14px 16px;border-top:3px solid #22c55e">
      <div style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">Contratações</div>
      <div style="font-size:24px;font-weight:900;color:#22c55e">${contr_total}</div>
    </div>
    <div style="background:var(--navy);border-radius:8px;padding:14px 16px;border-top:3px solid #22c55e">
      <div style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">Economia registrada</div>
      <div style="font-size:24px;font-weight:900;color:#22c55e">${Number(economia).toLocaleString("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0})}</div>
    </div>
  </div>

  <!-- ANÁLISE POR PERÍODO -->
  <div class="card cp" style="margin-bottom:12px">
    <div class="card-header" style="margin:-18px -20px 14px">
      <span class="card-title">Análise por período</span>
      <div style="display:inline-flex;background:#F0EDE4;border-radius:8px;padding:3px">
        ${[["mensal","Mensal"],["trimestral","Trimestral"],["anual","Anual"]].map(([k,l])=>`<button class="histgran-btn" data-histgran="${k}" style="border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;padding:6px 14px;border-radius:6px;background:${S.histGran===k?"white":"transparent"};color:${S.histGran===k?"var(--orange)":"var(--muted)"};box-shadow:${S.histGran===k?"0 1px 3px rgba(0,0,0,.1)":"none"}">${l}</button>`).join("")}
      </div>
    </div>
    <div class="tw"><table>
      <thead><tr><th>Período (${HGR[S.histGran]})</th><th>Eventos</th><th>Cancelamentos</th><th>Contratações</th><th>Impacto líquido BRL/mês</th></tr></thead>
      <tbody>${aggArr.map((a,i)=>`<tr style="background:${i%2===0?"white":"#FDFCF8"}">
        <td style="font-weight:800;white-space:nowrap">${a.periodo}</td>
        <td style="font-weight:700">${a.n}</td>
        <td style="color:${a.canc?"#dc2626":"#ccc"};font-weight:700">${a.canc||"—"}</td>
        <td style="color:${a.contr?"#15803d":"#ccc"};font-weight:700">${a.contr||"—"}</td>
        <td style="font-weight:800;color:${a.impacto<0?"#15803d":a.impacto>0?"#dc2626":"#ccc"}">${a.impacto?(a.impacto>0?"+":"")+Number(a.impacto).toLocaleString("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0}):"—"}</td>
      </tr>`).join("")}</tbody>
    </table></div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Impacto líquido = soma do impacto BRL/mês dos eventos no período (negativo = economia por cancelamentos).</div>
  </div>

  <!-- LOG TABLE -->
  <div class="card fade">
    <div class="card-header"><span class="card-title">Log de mudanças</span><span style="font-size:11px;color:var(--muted);font-weight:700">${S.changelog.length} eventos</span></div>
    <div class="tw"><table>
      <thead><tr><th>Data</th><th>Ferramenta</th><th>Tipo</th><th>De → Para</th><th>Impacto BRL</th><th>Observações</th></tr></thead>
      <tbody>${S.changelog.map((c,i)=>{
        const tc=c.tipo_evento==="Cancelamento"?"color:#dc2626;background:#fef2f2":c.tipo_evento==="Contratação"?"color:#15803d;background:#dcfce7":"color:#b45309;background:#fef3c7";
        return`<tr style="background:${i%2===0?"white":"#FDFCF8"}">
          <td style="color:var(--muted);white-space:nowrap;font-weight:600;font-size:12px">${c.data_evento?new Date(c.data_evento+"T12:00:00").toLocaleDateString("pt-BR"):"—"}</td>
          <td style="font-weight:700">${c.ferramenta}</td>
          <td><span class="badge" style="${tc}">${c.tipo_evento}</span></td>
          <td style="color:var(--muted);font-weight:500">${c.status_de&&c.status_para?`${c.status_de} → ${c.status_para}`:"—"}</td>
          <td style="font-weight:800;color:${c.impacto_brl?"#15803d":"#ccc"}">${c.impacto_brl?Number(c.impacto_brl).toLocaleString("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0}):"—"}</td>
          <td style="color:var(--muted);font-size:12px">${c.observacoes||"—"}</td>
        </tr>`;}).join("")}
      </tbody>
    </table></div>
    ${S.changelog.length===0?`<div class="empty">Nenhum evento registrado</div>`:""}
  </div>`;}

function buildModal(){
  const t=S.editTool;const f=S.editForm;
  return`<div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="mhdr"><span class="mtitle"><span class="mtitle-dot"></span>${t.ferramenta}</span><button class="mclose" id="modal-close">×</button></div>
      <div class="mbody">
        <div class="fg">
          <div class="ff ff-full"><label>Status</label><select id="f-status">${["ATIVA","EM_AVALIAÇÃO","FORA_DA_GESTÃO","CANCELADA"].map(s=>`<option value="${s}"${(f.status||"ATIVA")===s?" selected":""}>${(SM[s]||{l:s}).l}</option>`).join("")}</select></div>
          <div class="fg" style="background:#F4F1EA;padding:12px;border-radius:8px;margin-bottom:8px;grid-column:1/-1">
            <div style="display:flex;align-items:center;justify-content:space-between;grid-column:1/-1;margin-bottom:10px">
              <span style="font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.06em">💰 Custo e Câmbio</span>
              ${S.cambio&&!S.cambio.error?`<span style="font-size:10px;color:var(--muted)">BCB PTAX: <strong style="color:var(--navy)">USD R$ ${S.cambio.usd?.[0]?.value?.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})||'—'}</strong> · <strong style="color:var(--navy)">EUR R$ ${S.cambio.eur?.[0]?.value?.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})||'—'}</strong> <span style="color:#bbb">(hoje)</span></span>`:''}
            </div>
            <div class="ff"><label>Custo original</label><input id="f-custo_original" type="number" step="0.01" placeholder="ex: 299.00" value="${f.custo_original||""}" oninput="window._calcBRL()"></div>
            <div class="ff"><label>Qtd. usuários</label><input id="f-usuarios_qtd" type="number" step="1" min="0" placeholder="ex: 5" value="${f.usuarios_qtd??""}"></div>
            <div class="ff"><label>Moeda</label><select id="f-moeda" onchange="window._calcBRL()"><option value="BRL"${(f.moeda||"BRL")==="BRL"?" selected":""}>BRL — Real</option><option value="USD"${f.moeda==="USD"?" selected":""}>USD — Dólar</option><option value="EUR"${f.moeda==="EUR"?" selected":""}>EUR — Euro</option></select></div>
            <div class="ff">
              <label style="display:flex;align-items:center;justify-content:space-between">
                <span>BRL/Mês (atual)</span>
                ${S.cambio&&!S.cambio.error?`<button type="button" onclick="window._calcBRL(true)" style="font-size:10px;background:#E8461E;color:white;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit">↻ Calcular</button>`:''}
              </label>
              <input id="f-custo_brl_mes" type="number" step="0.01" placeholder="ex: 1540.00" value="${f.custo_brl_mes||""}">
            </div>
            <div class="ff">
              <label style="display:flex;align-items:center;justify-content:space-between">
                <span>Câmbio na contratação</span>
                ${S.cambio&&!S.cambio.error?`<button type="button" onclick="window._usarCambioHoje()" style="font-size:10px;background:var(--navy);color:white;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit">Usar hoje</button>`:''}
              </label>
              <input id="f-cambio" type="number" step="0.0001" placeholder="ex: 5.2300" value="${f.cambio_contratacao||""}" oninput="window._calcBRL()">
            </div>
            <div class="ff ff-full"><label>Nota do câmbio</label><input id="f-cambio_notas" placeholder="ex: USD 1 = R$ 5,23 em Jan/2026" value="${f.cambio_notas||""}"></div>
            <div id="modal-cambio-preview" style="grid-column:1/-1;font-size:11px;color:var(--muted);margin-top:4px"></div>
          </div>
          <div class="ff"><label>Responsável</label><input id="f-responsavel" value="${f.responsavel||""}"></div>
          <div class="ff"><label>Aprovado por</label><input id="f-aprovado_por" value="${f.aprovado_por||""}"></div>
          <div class="ff"><label>Centro de custo</label><input id="f-centro" value="${f.centro_de_custo||""}"></div>
          <div class="ff"><label>Score utilização</label><select id="f-score"><option value="">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}"${f.score_utilizacao==n?" selected":""}>${n} — ${SL[n]}</option>`).join("")}</select></div>
          <div class="ff"><label>NPS interno</label><select id="f-nps"><option value="">—</option>${["Usa bem","Usa pouco","Não usa"].map(v=>`<option value="${v}"${f.nps_interno===v?" selected":""}>${v}</option>`).join("")}</select></div>
          <div class="ff"><label>Substituto</label><input id="f-substituto" value="${f.substituto||""}"></div>
          <div class="ff"><label>Data contratação</label><input type="date" id="f-data_c" value="${f.data_contratacao||""}"></div>
          <div class="ff"><label>Próxima renovação</label><input type="date" id="f-prox_renov" value="${f.prox_renovacao||""}"></div>
          <div class="ff"><label>Última revisão</label><input type="date" id="f-ultima_r" value="${f.ultima_revisao||""}"></div>
          <div class="ff ff-full"><label>Ação pendente</label><input id="f-acao" value="${f.acao_pendente||""}"></div>
          <div class="ff ff-full"><label>Justificativa da contratação</label><textarea id="f-justif_contr" rows="2" style="width:100%;font-family:inherit;font-size:13px;padding:8px;border:1px solid #E5E2D8;border-radius:6px;resize:vertical;box-sizing:border-box">${f.justificativa_contratacao||""}</textarea></div>
          <div class="ff"><label>Responsável pela contratação</label><input id="f-resp_contr" value="${f.responsavel_contratacao||""}"></div>
          <div class="ff"><label>Data de cancelamento</label><input type="date" id="f-data_cancel" value="${f.data_cancelamento||""}"></div>
          <div class="ff"><label>Etapa do funil (bowtie)</label><select id="f-etapa"><option value="">—</option>${["Atração","Educação & Nutrição","Prospecção & Qualificação","Conversão / Fecho","Onboarding & Ativação","Retenção & Sucesso","Expansão & Advocacy","Transversal"].map(s=>`<option value="${s}"${f.etapa_funil===s?" selected":""}>${s}</option>`).join("")}</select></div>
          <div class="ff ff-full"><label>Justificativa (bowtie)</label><textarea id="f-justif_funil" rows="2" style="width:100%;font-family:inherit;font-size:13px;padding:8px;border:1px solid #E5E2D8;border-radius:6px;resize:vertical;box-sizing:border-box">${f.justificativa_funil||""}</textarea></div>
        </div>
        <div class="mfoot">
          <button class="bcnl" id="modal-cancel">Cancelar</button>
          <button class="bsave" id="modal-save" ${S.saving?"disabled":""}>Salvar</button>
        </div>
      </div>
    </div>
  </div>`;
}

function attachEvents(){
  document.getElementById("btn-refresh")?.addEventListener("click",loadData);
  document.querySelectorAll(".th-sort").forEach(th=>th.addEventListener("click",()=>{
    const k=th.dataset.sortkey;
    if(S.sSort.key===k){ S.sSort.dir=-S.sSort.dir; } else { S.sSort.key=k; S.sSort.dir=1; }
    render();
  }));
  document.getElementById("fx-apply")?.addEventListener("click",window._applyFx);
  document.getElementById("fx-reset")?.addEventListener("click",window._resetFx);
  ["fx-usd","fx-eur"].forEach(id=>document.getElementById(id)?.addEventListener("keydown",e=>{if(e.key==="Enter")window._applyFx();}));
  document.getElementById("btn-logout")?.addEventListener("click",async()=>{await sb.auth.signOut();showLogin();});
  document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{S.tab=btn.dataset.tab;render();}));
  document.getElementById("search-input")?.addEventListener("input",e=>{S.search=e.target.value;render();});
  document.getElementById("sf-reset")?.addEventListener("click",()=>{S.sFiltros={status:{mode:"in",vals:[]},dept:{mode:"in",vals:[]},cc:{mode:"in",vals:[]}};S.search="";S.openFilter=null;render();});
  document.getElementById("rf-reset")?.addEventListener("click",()=>{S.rFiltros={prioridade:{mode:"in",vals:[]},tipo:{mode:"in",vals:[]},dept:{mode:"in",vals:[]}};S.openFilter=null;render();});
  document.querySelectorAll(".gran-btn").forEach(b=>b.addEventListener("click",()=>{S.custoGran=b.dataset.gran;render();}));
  document.querySelectorAll(".histgran-btn").forEach(b=>b.addEventListener("click",()=>{S.histGran=b.dataset.histgran;render();}));
  document.querySelectorAll(".gf-btn").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const key=b.dataset.scope+":"+b.dataset.gf;S.openFilter=S.openFilter===key?null:key;render();}));
  document.querySelectorAll(".gf-pop").forEach(p=>p.addEventListener("click",e=>e.stopPropagation()));
  document.querySelectorAll(".gf-chk").forEach(c=>c.addEventListener("change",()=>{const arr=({g:S.gFiltros,s:S.sFiltros,r:S.rFiltros}[c.dataset.scope])[c.dataset.gf].vals;const v=c.dataset.val;const i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);render();}));
  document.querySelectorAll(".gf-clear").forEach(b=>b.addEventListener("click",()=>{({g:S.gFiltros,s:S.sFiltros,r:S.rFiltros}[b.dataset.scope])[b.dataset.gf].vals=[];render();}));
  document.querySelectorAll(".gf-close").forEach(b=>b.addEventListener("click",()=>{S.openFilter=null;render();}));
  document.getElementById("gf-critica")?.addEventListener("change",e=>{S.gFiltros.critica=e.target.value;render();});
  document.getElementById("gf-reset")?.addEventListener("click",()=>{S.gFiltros={status:{mode:"in",vals:[]},dept:{mode:"in",vals:[]},cc:{mode:"in",vals:[]},cat:{mode:"in",vals:[]},mercado:{mode:"in",vals:[]},critica:"all"};S.openFilter=null;render();});
  if(!window._gfOutside){window._gfOutside=true;document.addEventListener("click",e=>{if(S.openFilter&&e.target.closest&&!e.target.closest(".gf-wrap")){S.openFilter=null;render();}});}
  document.querySelectorAll(".edit-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const tool=S.tools.find(t=>t.id==btn.dataset.id);if(!tool)return;
    S.editTool=tool;S.editForm={usuarios_qtd:tool.usuarios_qtd??"",responsavel:tool.responsavel||"",aprovado_por:tool.aprovado_por||"",centro_de_custo:tool.centro_de_custo||"",score_utilizacao:tool.score_utilizacao||"",nps_interno:tool.nps_interno||"",substituto:tool.substituto||"",data_contratacao:tool.data_contratacao||"",ultima_revisao:tool.ultima_revisao||"",prox_renovacao:tool.prox_renovacao||"",acao_pendente:tool.acao_pendente||"",custo_original:tool.custo_original||"",moeda:tool.moeda||"BRL",custo_brl_mes:tool.custo_brl_mes||"",cambio_contratacao:tool.cambio_contratacao||"",cambio_notas:tool.cambio_notas||""};
    render();
  }));
  document.querySelectorAll(".cbtn").forEach(btn=>btn.addEventListener("click",async()=>{
    btn.disabled=true;btn.textContent="...";
    try{await patchRisk(parseInt(btn.dataset.riskId),{status_acao:"Concluído",data_resolucao:new Date().toISOString().slice(0,10)});S.risks=S.risks.map(r=>r.id==btn.dataset.riskId?{...r,status_acao:"Concluído"}:r);toast("Risco concluído");render();}
    catch(e){toast("Erro",true);btn.disabled=false;btn.textContent="Concluir";}
  }));
  document.getElementById("modal-bg")?.addEventListener("click",e=>{if(e.target.id==="modal-bg")closeModal();});
  document.getElementById("modal-close")?.addEventListener("click",closeModal);
  document.getElementById("modal-cancel")?.addEventListener("click",closeModal);
  document.getElementById("modal-save")?.addEventListener("click",async()=>{
    const gv=id=>document.getElementById(id)?.value||null;const gn=id=>{const v=document.getElementById(id)?.value;return v?parseFloat(v):null;};const payload={responsavel:gv("f-responsavel"),aprovado_por:gv("f-aprovado_por"),centro_de_custo:gv("f-centro"),score_utilizacao:gv("f-score")?parseInt(gv("f-score")):null,nps_interno:gv("f-nps"),substituto:gv("f-substituto"),data_contratacao:gv("f-data_c"),ultima_revisao:gv("f-ultima_r"),prox_renovacao:gv("f-prox_renov"),acao_pendente:gv("f-acao"),custo_original:gn("f-custo_original"),usuarios_qtd:gv("f-usuarios_qtd")?parseInt(gv("f-usuarios_qtd")):null,moeda:gv("f-moeda")||"BRL",custo_brl_mes:gn("f-custo_brl_mes"),cambio_contratacao:gn("f-cambio"),cambio_notas:gv("f-cambio_notas"),status:gv("f-status")||"ATIVA",justificativa_contratacao:gv("f-justif_contr"),responsavel_contratacao:gv("f-resp_contr"),data_cancelamento:gv("f-data_cancel"),etapa_funil:gv("f-etapa"),justificativa_funil:gv("f-justif_funil")};
    S.saving=true;render();
    try{await patchTool(S.editTool.id,payload);S.tools=S.tools.map(t=>t.id===S.editTool.id?{...t,...payload}:t);toast("Alteração guardada");S.editTool=null;}
    catch(e){toast("Erro ao guardar",true);}
    finally{S.saving=false;render();}
  });
}
function closeModal(){S.editTool=null;render();}

initAuth();
</script>
</body>
</html>
